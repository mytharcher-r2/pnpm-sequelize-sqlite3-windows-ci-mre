name: ci
on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Debug env
        run: |
          node -p "process.version"
          node -p "process.platform + ' ' + process.arch"
          pnpm -v

      - name: Install base deps (no sqlite3)
        run: pnpm install

      # pnpm does not support `pnpm add --no-save`.
      # Workaround: add sqlite3, then restore manifest/lock so repo stays unchanged.
      - name: Install sqlite3 only for CI (keep repo unchanged)
        run: |
          pnpm add sqlite3
          git restore package.json pnpm-lock.yaml || true

      - name: Verify sqlite3 can be required
        run: node -e "require('sqlite3'); console.log('sqlite3 loaded')"

      - name: Smoke test (sequelize + sqlite)
        run: pnpm test
